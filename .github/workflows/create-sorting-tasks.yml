name: Create SortingAnalysis tasks

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-tasks:
    name: Create labels and testing tasks
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}

    steps:
      - name: Create labels
        run: |
          gh label create "type: test" --description "Тестирование программы или алгоритма" --color "8250df" --force --repo "$REPO"
          gh label create "type: docs" --description "Документация пользователя" --color "0969da" --force --repo "$REPO"
          gh label create "type: report" --description "Отчёт по результатам тестирования" --color "fbca04" --force --repo "$REPO"
          gh label create "type: bug" --description "Ошибка, найденная во время тестирования" --color "d1242f" --force --repo "$REPO"
          gh label create "needs review" --description "Нужна проверка преподавателем" --color "d4c5f9" --force --repo "$REPO"

      - name: Create issues
        run: |
          create_issue_if_missing() {
            TITLE="$1"
            LABELS="$2"
            BODY="$3"

            EXISTING_URL=$(gh issue list \
              --repo "$REPO" \
              --state all \
              --search "$TITLE in:title" \
              --json title,url \
              --jq ".[] | select(.title == \"$TITLE\") | .url" | head -n 1)

            if [ -n "$EXISTING_URL" ]; then
              echo "Issue already exists: $TITLE"
              echo "$EXISTING_URL"
            else
              echo "Creating issue: $TITLE"
              gh issue create \
                --repo "$REPO" \
                --title "$TITLE" \
                --label "$LABELS" \
                --body "$BODY"
            fi
          }

          create_issue_if_missing \
            "Изучить готовую программу SortingAnalysis" \
            "type: test,needs review" \
            "## Описание

          Нужно скачать готовую программу из GitHub Releases, запустить её и изучить интерфейс.

          ## Проверить

          - запускается ли программа;
          - какие сортировки доступны;
          - как генерируется массив;
          - как вводится массив вручную;
          - как загружается массив из файла;
          - как сохраняется исходный массив;
          - как сохраняется отсортированный массив;
          - выводится ли время сортировки.

          ## Результат

          Создать файл:

          \`\`\`text
          test-results/program-overview.md
          \`\`\`

          ## Ветка

          \`\`\`bash
          feature/program-overview
          \`\`\`

          ## Pull Request

          \`\`\`text
          feature/program-overview -> main
          \`\`\`"

          create_issue_if_missing \
            "Подготовить план тестирования SortingAnalysis" \
            "type: test,needs review" \
            "## Описание

          Нужно подготовить общий план тестирования программы SortingAnalysis.

          ## В плане должны быть описаны группы данных

          ### Обычный набор данных

          Числа от 0 и выше.

          Размеры массивов:

          \`\`\`text
          10
          100
          1000
          2000
          5000
          10000
          25000
          \`\`\`

          ### Необычные наборы данных

          Для каждого необычного набора достаточно размеров:

          \`\`\`text
          100
          1000
          5000
          \`\`\`

          Наборы:

          - уже отсортированный массив;
          - массив из 2 уникальных значений;
          - массив из 3 уникальных значений;
          - массив из 5 уникальных значений;
          - массив из 10 уникальных значений;
          - массив только из отрицательных чисел до 0;
          - массив из отрицательных и положительных чисел.

          ## Результат

          Создать файл:

          \`\`\`text
          test-results/test-plan.md
          \`\`\`

          ## Ветка

          \`\`\`bash
          feature/test-plan
          \`\`\`

          ## Pull Request

          \`\`\`text
          feature/test-plan -> main
          \`\`\`"

