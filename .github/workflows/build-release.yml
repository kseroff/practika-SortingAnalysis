name: Build and publish SortingAnalysis release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag"
        required: true
        default: "sortinganalysis-latest"
      release_title:
        description: "Release title"
        required: true
        default: "SortingAnalysis latest build"
      release_notes:
        description: "Release notes"
        required: false
        default: "Ручная сборка программы SortingAnalysis для тестирования сортировок."

permissions:
  contents: write

jobs:
  build-release:
    name: Build Windows x64 Release and publish
    runs-on: windows-2022

    env:
      GH_TOKEN: ${{ github.token }}
      BUILD_DIR: build
      PACKAGE_DIR: package
      APP_NAME: SortingAnalysis
      ZIP_NAME: SortingAnalysis-windows-x64.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B "$env:BUILD_DIR" -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        shell: pwsh
        run: |
          cmake --build "$env:BUILD_DIR" --config Release

      - name: Find executable
        shell: pwsh
        run: |
          $exeFiles = Get-ChildItem -Path "$env:BUILD_DIR" -Filter "$env:APP_NAME.exe" -Recurse

          if ($exeFiles.Count -eq 0) {
            Write-Host "No exact $env:APP_NAME.exe found. Searching any .exe in build directory..."
            $exeFiles = Get-ChildItem -Path "$env:BUILD_DIR" -Filter "*.exe" -Recurse
          }

          if ($exeFiles.Count -eq 0) {
            throw "Build finished, but no executable was found."
          }

          Write-Host "Found executables:"
          $exeFiles | ForEach-Object { Write-Host $_.FullName }

          $exe = $exeFiles[0]

          New-Item -ItemType Directory -Force -Path "$env:PACKAGE_DIR" | Out-Null
          Copy-Item $exe.FullName -Destination "$env:PACKAGE_DIR"

          "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_ENV
          "EXE_NAME=$($exe.Name)" >> $env:GITHUB_ENV

          Write-Host "Selected executable: $($exe.FullName)"

      - name: Add release readme
        shell: pwsh
        run: |
          @"
          SortingAnalysis

          Это готовая сборка программы для тестирования сортировок.

          Как использовать:
          1. Распакуйте архив.
          2. Запустите SortingAnalysis.exe.
          3. Сгенерируйте массив, введите массив вручную или загрузите массив из файла.
          4. Выберите сортировку.
          5. Результаты сортировки будут сохранены в txt-файл.

          Примечание:
          Если Windows блокирует запуск, откройте свойства файла и нажмите "Разблокировать".
          "@ | Out-File -FilePath "$env:PACKAGE_DIR/README.txt" -Encoding UTF8

      - name: Create zip package
        shell: pwsh
        run: |
          if (Test-Path "$env:ZIP_NAME") {
            Remove-Item "$env:ZIP_NAME" -Force
          }

          Compress-Archive -Path "$env:PACKAGE_DIR/*" -DestinationPath "$env:ZIP_NAME" -Force

          Write-Host "Created package: $env:ZIP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SortingAnalysis-windows-x64
          path: ${{ env.ZIP_NAME }}
          retention-days: 14

      - name: Publish GitHub Release
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag_name }}"
          $title = "${{ github.event.inputs.release_title }}"
          $notes = "${{ github.event.inputs.release_notes }}"

          Write-Host "Publishing release:"
          Write-Host "Tag: $tag"
          Write-Host "Title: $title"

          gh release delete "$tag" --yes --cleanup-tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous release found for tag $tag, or delete failed. Continuing..."
          }

          gh release create "$tag" `
            "$env:ZIP_NAME" `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "$title" `
            --notes "$notes"
